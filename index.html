<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Search - Vehicle Details (Firebase Master DB)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for reading Excel files -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f1f5f9;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-bold text-blue-800">Vehicle Master Data</h1>
                <p class="text-slate-500">ระบบจัดการฐานข้อมูลรถยนต์และค้นหาจากส่วนกลาง (Firebase Realtime Database)</p>
            </div>
            <div class="text-right hidden sm:block">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Master Database Tool</span>
                <div class="text-[10px] text-emerald-600 font-medium mt-1 flex items-center justify-end gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Firebase Connected
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Left Panel: Controls -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-6">
                    
                    <!-- ส่วนที่ 1: ค้นหา (Search) -->
                    <div class="mb-8 border-b border-slate-100 pb-6">
                        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            ค้นหาข้อมูล
                        </h3>
                        
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <label class="block text-xs font-bold text-slate-500 uppercase">รายการ Vin หรือ รุ่น</label>
                                    <button onclick="window.document.getElementById('importInput').click()" 
                                        class="text-[10px] bg-slate-50 text-slate-600 border border-slate-200 px-2 py-1 rounded hover:bg-slate-100 transition flex items-center gap-1">
                                        📄 นำเข้าไฟล์
                                    </button>
                                    <input type="file" id="importInput" accept=".xlsx, .xls, .csv, .txt" class="hidden" onchange="window.importSearchTerms(this)">
                                </div>
                                <textarea id="searchInput" rows="4" 
                                    placeholder="ใส่ VinNo ที่ต้องการค้นหา..."
                                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition resize-none placeholder:text-slate-300"
                                ></textarea>
                            </div>

                            <button onclick="window.searchFromCloud()" 
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                                ค้นหาข้อมูล
                            </button>
                            <p class="text-[10px] text-slate-400 text-center">ค้นหาข้อมูลล่าสุดที่อัปโหลดไว้บนระบบ</p>
                        </div>
                    </div>

                    <!-- ส่วนที่ 2: จัดการฐานข้อมูล (Master Data Management) -->
                    <div>
                        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                            </svg>
                            อัปเดตฐานข้อมูลหลัก
                        </h3>
                        
                        <div class="p-4 bg-slate-50 rounded-xl border border-slate-200 space-y-3">
                            <div class="bg-white p-2 rounded border border-slate-200">
                                <input type="file" id="excelFile" accept=".xlsx, .xls" 
                                    class="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer"
                                />
                            </div>
                            
                            <button onclick="window.uploadMasterData()" 
                                class="w-full text-xs bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg transition shadow-sm flex items-center justify-center gap-2 font-bold">
                                ⬆️ อัปโหลดเข้า Master DB
                            </button>
                            
                            <div class="flex items-center gap-2 pt-2 border-t border-slate-200">
                                <button onclick="window.searchExcel()" class="flex-1 text-[10px] bg-white border border-slate-300 hover:bg-slate-50 text-slate-600 py-1.5 rounded transition">
                                    ค้นหาในไฟล์นี้ (ไม่ใช้เน็ต)
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right Panel: Results -->
            <div class="lg:col-span-3">
                <div id="statusMessage" class="hidden p-4 mb-6 text-sm rounded-xl text-center font-medium shadow-sm border"></div>

                <div id="resultArea" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full max-h-[800px]">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 flex-none">
                        <h2 class="font-bold text-slate-800 flex items-center gap-2">
                            ผลการค้นหา: <span id="matchCount" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-sm">0</span> <span class="text-sm font-normal text-slate-500">รายการ</span>
                        </h2>
                        
                        <div class="flex gap-2">
                             <!-- Save Search History Button -->
                             <button onclick="window.saveToFirebase()" class="text-sm bg-orange-100 hover:bg-orange-200 text-orange-700 px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-2 font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                บันทึกประวัติ
                            </button>

                            <button onclick="window.exportToExcel()" class="text-sm bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition shadow-sm hover:shadow flex items-center gap-2 font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                                Export
                            </button>
                            
                            <button onclick="window.clearResults()" class="text-sm
